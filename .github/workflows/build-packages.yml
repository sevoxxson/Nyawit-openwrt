name: Build custom packages (SDK, manual only)

# Compiles the custom .apk packages (lpac, 0xygen-aio, luci-app-modemband,
# modemband, modemdata, atinout, rebuilt libcurl with IMAP/POP3/SMTP, etc.)
# for arm_cortex-a7_neon-vfpv4 using the OpenWrt SDK.
#
# This workflow is intentionally manual-only: building everything from source
# takes ~25 minutes, but the resulting .apk files rarely change.
#
# Usage:
#   1. Go to Actions → "Build custom packages (SDK, manual only)" → Run workflow
#   2. Wait for it to finish, then download the
#      `custom-packages-arm_cortex-a7_neon-vfpv4-<version>` artifact
#   3. Extract the .apk files you want into `packages/prebuilt/` and commit
#   4. Push — the much faster build-firmware.yml will bake them into a new
#      sysupgrade image.

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release (must have a published SDK image)'
        required: true
        default: '25.12.3'

permissions:
  contents: read

env:
  DEFAULT_OPENWRT_VERSION: '25.12.3'
  TARGET_ARCH: 'arm_cortex-a7_neon-vfpv4'

jobs:
  build-packages:
    name: Build custom packages (SDK)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build parameters
        # User-controlled workflow_dispatch inputs are passed through env vars
        # (and validated below) rather than interpolated into the run script
        # so they cannot be used for shell injection.
        env:
          INPUT_OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version }}
        run: |
          OPENWRT_VERSION="${INPUT_OPENWRT_VERSION:-${DEFAULT_OPENWRT_VERSION}}"
          case "${OPENWRT_VERSION}" in
              *[!A-Za-z0-9._-]*|'')
                  echo "::error::invalid openwrt_version: ${OPENWRT_VERSION}"; exit 1 ;;
          esac
          echo "OPENWRT_VERSION=${OPENWRT_VERSION}" >> "$GITHUB_ENV"

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
              "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          df -h

      - name: Pull OpenWrt SDK image
        run: docker pull "openwrt/sdk:${TARGET_ARCH}-${OPENWRT_VERSION}"

      - name: Build packages in OpenWrt SDK
        run: |
          docker run --rm \
            --user root \
            -e WORK=/work \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            "openwrt/sdk:${TARGET_ARCH}-${OPENWRT_VERSION}" \
            /bin/bash /work/scripts/build-packages.sh

      - name: Show built packages
        run: ls -la dist/packages || true

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-packages-${{ env.TARGET_ARCH }}-${{ env.OPENWRT_VERSION }}
          path: dist/packages/**
          if-no-files-found: error
          retention-days: 14
